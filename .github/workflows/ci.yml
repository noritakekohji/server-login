name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer & Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $targets = Get-ChildItem -Recurse -File -Include *.ps1,*.psm1,*.psd1
          $results = $targets | ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Severity Warning }
          if ($results) { $results | Format-Table; exit 1 }

      - name: Test (Pester)
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config
